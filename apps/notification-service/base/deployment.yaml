apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: pifaqorik/notification-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - secretRef:
                name: notification-service-secret
